name: iOS CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'Steep/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    paths:
      - 'Steep/**'
      - '.github/workflows/ios-ci.yml'

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode Version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew update
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode Project
        run: |
          cd Steep
          xcodegen generate --spec project.yml

      - name: Show Project Schemes
        run: xcodebuild -list -project Steep/Steep.xcodeproj

      - name: Build (Debug, iOS Simulator)
        run: |
          xcodebuild \
            -project Steep/Steep.xcodeproj \
            -scheme Steep \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Test (iOS Simulator)
        run: |
          xcodebuild \
            -project Steep/Steep.xcodeproj \
            -scheme SteepTests \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            test

  deploy:
    runs-on: macos-26
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: build-and-test
    timeout-minutes: 60
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
      ASC_KEY_CONTENT_BASE64: ${{ secrets.ASC_KEY_CONTENT_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode Version
        run: xcodebuild -version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: Steep

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Deploy to TestFlight
        run: |
          cd Steep
          bundle exec fastlane beta
