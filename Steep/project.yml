name: Steep
options:
  minimumXcodeGenVersion: 2.38.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.steep.app
    DEVELOPMENT_TEAM: K4B3QDXWLD
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    SWIFT_VERSION: 5.10
    TARGETED_DEVICE_FAMILY: 1
    INFOPLIST_FILE: Info.plist
packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: 2.15.0
targets:
  Steep:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Components
      - path: Design
      - path: Features
      - path: Models
      - path: Services
      - path: Utilities
      - path: Info.plist
      - path: LaunchScreen.storyboard
      - path: Assets.xcassets
    dependencies:
      - package: Supabase
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 2
    info:
      path: Info.plist
      properties:
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_PUBLISHABLE: $(SUPABASE_PUBLISHABLE)
        SUPABASE_AUTH_REDIRECT_URL: $(SUPABASE_AUTH_REDIRECT_URL)
        GOOGLE_MAPS_API: $(GOOGLE_MAPS_API)
        NSPhotoLibraryUsageDescription: Allow photo access so you can attach images to your logs.
        ITSAppUsesNonExemptEncryption: false
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: com.steep.app.auth
            CFBundleURLSchemes:
              - steep
        UILaunchStoryboardName: LaunchScreen
        UIRequiresFullScreen: true
        UIDeviceFamily:
          - 1
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  SteepTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Steep
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.steep.app.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Steep.app/Steep
        BUNDLE_LOADER: $(TEST_HOST)
